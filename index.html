<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>優兒行動銀行</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#e6007e">
    <link rel="apple-touch-icon" href="icon-192.png">
    <script src="https://unpkg.com/html5-qrcode"></script>

    <script>
        /**
         * 版本號更新至 2.7
         * 修正：移除自動啟動，強制使用者手動點擊按鈕以解鎖音效權限
         */
        (function() {
            const CURRENT_VERSION = "2.7"; 
            const cachedVersion = localStorage.getItem('app_version');
            if (cachedVersion !== CURRENT_VERSION) {
                localStorage.setItem('app_version', CURRENT_VERSION);
                window.location.href = window.location.pathname + '?v=' + CURRENT_VERSION;
            }
        })();
    </script>

    <style>
        body { font-family: sans-serif; text-align: center; margin: 0; padding: 10px; background-color: #f4f4f4; }
        .container { background: white; padding: 15px; border-radius: 15px; max-width: 400px; margin: auto; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { margin: 5px 0 10px 0 !important; font-size: 22px; } 
        #reader { width: 100%; margin-bottom: 5px; border-radius: 10px; overflow: hidden; background-color: #000; min-height: 250px; }
        .name { font-size: 38px !important; font-weight: 900 !important; color: #e6007e; margin: 0 !important; line-height: 1.1; }
        .balance { font-size: 32px; font-weight: bold; color: #2c3e50; margin: 5px 0 0 0 !important; }
        .amount-section { background: #fff9fb; padding: 10px; border-radius: 10px; margin-top: 10px; margin-bottom: 15px; }
        input#amount { width: 85%; padding: 10px; font-size: 28px; text-align: center; border: 2px solid #e6007e; border-radius: 10px; margin-bottom: 10px; }
        .btn-group { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 10px; }
        .btn-quick { background: #fff; border: 1px solid #e6007e; color: #e6007e; padding: 12px 0; border-radius: 5px; font-size: 15px; font-weight: bold; }
        .note-section { text-align: left; margin-bottom: 15px; }
        .note-group { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
        .btn-note { background: #eee; border: none; padding: 12px 0; border-radius: 5px; font-size: 13px; color: #333; }
        .btn-note.active { background: #333; color: #fff; font-weight: bold; }
        .action-btn { display: block; width: 100% !important; padding: 18px 0 !important; font-size: 20px !important; font-weight: bold !important; border: none !important; border-radius: 10px !important; cursor: pointer; margin-top: 12px !important; box-sizing: border-box; }
        #ok-btn { background-color: #e6007e; color: white; }
        #start-btn { 
            background-color: #4CAF50; 
            color: white; 
            margin: 20px 0 !important;
            box-shadow: 0 4px 15px rgba(76, 175, 80, 0.4);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }
    </style>
</head>

<body>
<div class="container">
    <h2>💰 優兒行動銀行 💰</h2>

    <!-- 啟動按鈕改為顯眼的強制進入點 -->
    <button id="start-btn" class="action-btn" onclick="handleStartClick()">📢 點此啟動相機並開啟音效</button>
    <div id="reader"></div>

    <div id="result" style="display:none;">
        <div class="info" style="border-bottom: 2px dashed #eee; padding-bottom:10px;">
            <div id="name" class="name">---</div>
            <div id="balance" class="balance">---</div>
        </div>

        <div class="amount-section">
            <input type="number" id="amount" value="0">
            <div class="btn-group">
                <button class="btn-quick" onclick="addAmt(1)">+1</button>
                <button class="btn-quick" onclick="addAmt(5)">+5</button>
                <button class="btn-quick" onclick="addAmt(10)">+10</button>
                <button class="btn-quick" onclick="addAmt(50)">+50</button>
                <button class="btn-quick" onclick="addAmt(-1)">-1</button>
                <button class="btn-quick" onclick="addAmt(-5)">-5</button>
                <button class="btn-quick" onclick="addAmt(-10)">-10</button>
                <button class="btn-quick" onclick="addAmt(-50)">-50</button>
            </div>
            <button class="btn-quick" style="width:100%" onclick="document.getElementById('amount').value=0">歸零清空</button>
        </div>

        <div class="note-section">
            <span style="font-size:14px; font-weight:bold; color:#666;">選擇交易項目：</span>
            <div class="note-group">
                <button class="btn-note active" onclick="setNote(this, '一般交易')">一般交易</button>
                <button class="btn-note" onclick="setNote(this, '餅乾')">餅乾</button>
                <button class="btn-note" onclick="setNote(this, '飲料')">飲料</button>
                <button class="btn-note" onclick="setNote(this, '其他')">其他</button>
                <button class="btn-note" onclick="setNote(this, '項目 1')">項目 1</button>
                <button class="btn-note" onclick="setNote(this, '項目 2')">項目 2</button>
                <button class="btn-note" onclick="setNote(this, '項目 3')">項目 3</button>
                <button class="btn-note" onclick="setNote(this, '項目 4')">項目 4</button>
                <button class="btn-note" onclick="setNote(this, '項目 5')">項目 5</button>
                <button class="btn-note" onclick="setNote(this, '項目 6')">項目 6</button>
                <button class="btn-note" onclick="setNote(this, '項目 7')">項目 7</button>
                <button class="btn-note" onclick="setNote(this, '項目 8')">項目 8</button>
            </div>
        </div>

        <button id="ok-btn" class="action-btn" onclick="doTrade()">確認送出交易</button>
        <button class="reset-btn action-btn" onclick="resetUI()">取消並重新掃描</button>
    </div>
</div>

<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbzI8YIKfK2h5MVeUOWE1oJq4mHu4KguUOVS_gt0wZdHvSz1AaDaOaE8jCD0rmz9q9SV/exec";
const TOKEN = "abc123";

let scanner, globalId = "", tid = "", currentNote = "一般交易";

const successSound = new Audio("https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg");
const scanSound = new Audio("https://raw.githubusercontent.com/fevabe/qr-scanner-beep/main/beep.mp3");

// 確保跨網域資源可播放
scanSound.crossOrigin = "anonymous";
successSound.crossOrigin = "anonymous";

function handleStartClick() {
    // 1. 先播放一個靜音片段解鎖音效權限
    unlockAudio();
    // 2. 隨後啟動相機
    startScan();
}

function unlockAudio() {
    [scanSound, successSound].forEach(sound => {
        sound.play().then(() => {
            sound.pause();
            sound.currentTime = 0;
        }).catch(e => console.log("音效解鎖失敗"));
    });
}

function addAmt(val) {
    let input = document.getElementById("amount");
    input.value = (parseInt(input.value) || 0) + val;
}

function setNote(btn, noteText) {
    document.querySelectorAll('.btn-note').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentNote = noteText;
}

async function startScan() {
    document.getElementById("result").style.display = "none";
    document.getElementById("start-btn").style.display = "none";
    
    if (!scanner) scanner = new Html5Qrcode("reader");
    if (scanner.isScanning) await scanner.stop();

    try {
        await scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => {
            // 掃描成功播放嗶聲
            try {
                scanSound.currentTime = 0;
                scanSound.play();
            } catch (e) {}
            
            if (navigator.vibrate) navigator.vibrate(50);
            globalId = text.trim();
            tid = "T" + Date.now();
            scanner.stop().then(() => { fetchData(); });
        });
    } catch (err) {
        document.getElementById("start-btn").style.display = "block";
    }
}

async function fetchData() {
    try {
        const res = await fetch(`${scriptURL}?id=${globalId}&amount=0&token=${TOKEN}`);
        const data = await res.json();
        if (data.status === "success") {
            document.getElementById("name").innerText = data.name;
            document.getElementById("balance").innerText = "餘額: " + data.balance;
            document.getElementById("result").style.display = "block";
        } else { alert("❌ 讀取失敗"); resetUI(); }
    } catch (e) { alert("連線失敗"); resetUI(); }
}

async function doTrade() {
    const btn = document.getElementById("ok-btn");
    let amt = parseInt(document.getElementById("amount").value) || 0;
    if (amt === 0) return alert("請輸入金額");
    if (!confirm(`對象: ${document.getElementById("name").innerText}\n項目: ${currentNote}\n金額: ${amt}\n確認執行？`)) return;

    btn.disabled = true;
    try {
        const url = `${scriptURL}?id=${globalId}&amount=${amt}&tid=${tid}&token=${TOKEN}&note=${encodeURIComponent(currentNote)}`;
        const res = await fetch(url);
        const data = await res.json();
        if (data.status === "success") {
            successSound.play().catch(() => {});
            alert(`✅ 交易成功！\n餘額：${data.newBalance}`);
            resetUI();
        } else { alert("失敗"); btn.disabled = false; }
    } catch (e) { alert("錯誤"); btn.disabled = false; }
}

function resetUI() {
    document.getElementById("result").style.display = "none";
    document.getElementById("amount").value = 0;
    document.getElementById("ok-btn").disabled = false;
    startScan();
}

// 注意：這裡移除了 window.onload 自動啟動 scan 的邏輯
</script>
</body>
</html>
