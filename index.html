<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>優兒行動銀行 v4.6</title>
    
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/10006/10006206.png">
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/10006/10006206.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://unpkg.com/html5-qrcode"></script>

    <script>
        (function() {
            const CURRENT_VERSION = "4.6"; 
            const cachedVersion = localStorage.getItem('app_version');
            if (cachedVersion !== CURRENT_VERSION) {
                localStorage.setItem('app_version', CURRENT_VERSION);
                window.location.href = window.location.pathname + '?v=' + CURRENT_VERSION;
            }
        })();
    </script>

    <style>
        :root { --primary-pink: #e6007e; --bg-pink: #fce4ec; --dark-gray: #333; --btn-light: #eee; }
        body { font-family: -apple-system, sans-serif; text-align: center; margin: 0; padding: 15px; background-color: var(--primary-pink); }
        .main-card { background: var(--bg-pink); padding: 20px; border-radius: 30px; max-width: 400px; margin: auto; box-shadow: 0 10px 25px rgba(0,0,0,0.2); min-height: 85vh; }
        
        /* 修正相機容器高度防止黑影 */
        #reader { width: 100%; border-radius: 20px; overflow: hidden; background: #000; margin-bottom: 15px; min-height: 250px; }
        
        .info-box { background: rgba(255,255,255,0.5); padding: 15px; border-radius: 20px; margin-bottom: 20px; }
        .user-id { font-size: 14px; color: #888; margin-bottom: 2px; font-weight: bold; } 
        .user-name { font-size: 42px; font-weight: 900; color: var(--primary-pink); margin: 0; line-height: 1.1; }
        .user-balance { font-size: 36px; font-weight: bold; color: #333; margin: 5px 0 0 0; }
        
        .amount-display { background: white; border: 3px solid var(--dark-gray); border-radius: 15px; font-size: 48px; font-weight: bold; padding: 10px; margin-bottom: 20px; color: #000; }
        
        .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
        .btn-quick { background: white; border: none; border-radius: 15px; padding: 15px 0; font-size: 18px; font-weight: bold; box-shadow: 0 4px 0 #ddd; }
        .btn-quick:active { transform: translateY(2px); box-shadow: none; }
        .q-plus { color: #4caf50; } .q-minus { color: #f44336; }
        
        /* 交易項目按鈕樣式優化 (參考附圖) */
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; text-align: left; }
        .item-label { grid-column: span 3; font-size: 16px; font-weight: bold; color: #555; margin-bottom: 5px; }
        .btn-item { background: var(--btn-light); border: none; border-radius: 12px; padding: 15px 5px; font-size: 16px; font-weight: bold; color: #444; transition: 0.2s; }
        .btn-item.active { background: var(--dark-gray); color: white; }
        
        .action-btn { display: block; width: 100%; padding: 18px 0; font-size: 20px; font-weight: bold; border: none; border-radius: 15px; cursor: pointer; margin-bottom: 10px; }
        .action-btn:disabled { background-color: #ccc !important; cursor: not-allowed; box-shadow: none !important; }
        #start-btn { background: #4CAF50; color: white; }
        #ok-btn { background: var(--primary-pink); color: white; box-shadow: 0 5px 0 #ad005f; }
    </style>
</head>

<body>
<div class="main-card">
    <h2>💰 優兒行動銀行 💰</h2>
    <button id="start-btn" class="action-btn" onclick="initAndStart()">📢 點擊啟動相機</button>
    <div id="reader" style="display:none;"></div>

    <div id="trade-ui" style="display:none;">
        <div class="info-box">
            <div id="display-id" class="user-id">ID: ----</div>
            <div id="display-name" class="user-name">---</div>
            <div style="font-size:14px; color:#666; margin-top:5px;">目前餘額</div>
            <div id="display-balance" class="user-balance">---</div>
        </div>
        <div id="amount-val" class="amount-display">0</div>
        
        <div class="grid-4">
            <button class="btn-quick q-plus" onclick="modAmt(1)">+1</button>
            <button class="btn-quick q-plus" onclick="modAmt(5)">+5</button>
            <button class="btn-quick q-plus" onclick="modAmt(10)">+10</button>
            <button class="btn-quick q-plus" onclick="modAmt(50)">+50</button>
            <button class="btn-quick q-minus" onclick="modAmt(-1)">-1</button>
            <button class="btn-quick q-minus" onclick="modAmt(-5)">-5</button>
            <button class="btn-quick q-minus" onclick="modAmt(-10)">-10</button>
            <button class="btn-quick q-minus" onclick="modAmt(-50)">-50</button>
        </div>

        <div class="grid-3">
            <div class="item-label">選擇交易項目：</div>
            <button class="btn-item active" onclick="setNote(this, '一般交易')">一般交易</button>
            <button class="btn-item" onclick="setNote(this, '餅乾')">餅乾</button>
            <button class="btn-item" onclick="setNote(this, '飲料')">飲料</button>
            <button class="btn-item" onclick="setNote(this, '其他')">其他</button>
        </div>

        <button id="ok-btn" class="action-btn" onclick="doTrade()">確認交易送出</button>
        <button id="cancel-btn" class="action-btn" style="background:#666; color:white;" onclick="location.reload()">重新掃描</button>
    </div>
</div>

<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbzI8YIKfK2h5MVeUOWE1oJq4mHu4KguUOVS_gt0wZdHvSz1AaDaOaE8jCD0rmz9q9SV/exec";
const TOKEN = "abc123";
let scanner = null, globalId = "", currentAmt = 0, currentNote = "一般交易", oldBalance = 0;

// Web Audio (掃描音量調至 0.5)
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playBeep(freq = 850, duration = 0.15) {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = "sine";
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    gain.gain.setValueAtTime(0.5, audioCtx.currentTime); 
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
}

const successSound = new Audio("https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg");
successSound.crossOrigin = "anonymous";
successSound.volume = 0.4;

function initAndStart() {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    successSound.load(); 
    document.getElementById("start-btn").style.display = "none";
    document.getElementById("reader").style.display = "block";
    // 延遲啟動確保容器渲染完成
    setTimeout(startScan, 500);
}

async function startScan() {
    if (scanner) { try { await scanner.stop(); } catch(e){} }
    scanner = new Html5Qrcode("reader");
    try {
        await scanner.start(
            { facingMode: "environment" }, 
            { fps: 15, qrbox: { width: 250, height: 250 } }, 
            (text) => {
                playBeep();
                if (navigator.vibrate) navigator.vibrate(50);
                globalId = text.trim();
                scanner.stop().then(() => fetchData()).catch(() => fetchData());
            }
        );
    } catch (e) { 
        alert("相機啟動失敗，請確保已授權並關閉其他相機程式。");
        document.getElementById("start-btn").style.display = "block"; 
    }
}

async function fetchData() {
    document.getElementById("reader").style.display = "none";
    document.getElementById("trade-ui").style.display = "block";
    document.getElementById("display-name").innerText = "連線中...";
    try {
        const res = await fetch(`${scriptURL}?id=${globalId}&amount=0&token=${TOKEN}`);
        const data = await res.json();
        if (data.status === "success") {
            oldBalance = data.balance;
            document.getElementById("display-id").innerText = "ID: " + globalId;
            document.getElementById("display-name").innerText = data.name;
            document.getElementById("display-balance").innerText = data.balance;
        } else { alert("查無資料"); location.reload(); }
    } catch (e) { alert("網路不穩定，請重試"); location.reload(); }
}

function modAmt(v) { 
    currentAmt = currentAmt + v; 
    document.getElementById("amount-val").innerText = currentAmt; 
}

function setNote(btn, note) { 
    document.querySelectorAll('.btn-item').forEach(b => b.classList.remove('active')); 
    btn.classList.add('active'); 
    currentNote = note; 
}

async function doTrade() {
    if (currentAmt === 0) return alert("請輸入交易金額");
    const btnOk = document.getElementById("ok-btn");
    const btnCancel = document.getElementById("cancel-btn");
    btnOk.disabled = true;
    btnCancel.disabled = true;
    btnOk.innerText = "⏳ 交易處理中...";
    
    try {
        const url = `${scriptURL}?id=${globalId}&amount=${currentAmt}&token=${TOKEN}&note=${encodeURIComponent(currentNote)}&tid=T${Date.now()}`;
        const res = await fetch(url);
        const data = await res.json();
        
        if (data.status === "success") {
            successSound.play().catch(()=>{});
            setTimeout(() => {
                alert(
                    "✅ 交易成功！\n" +
                    "----------------------\n" +
                    "【學員 ID】: " + globalId + "\n" +
                    "【學員姓名】: " + data.name + "\n" +
                    "【交易項目】: " + currentNote + "\n" +
                    "【原金額】: " + oldBalance + "\n" +
                    "【變動金額】: " + (currentAmt > 0 ? "+" : "") + currentAmt + "\n" +
                    "【新餘額】: " + data.newBalance + "\n" +
                    "----------------------"
                );
                location.reload();
            }, 300);
        } else {
            alert("❌ 交易失敗：" + (data.message || "未知錯誤"));
            btnOk.disabled = false;
            btnCancel.disabled = false;
            btnOk.innerText = "確認交易送出";
        }
    } catch (e) { 
        alert("連線失敗，請檢查網路"); 
        btnOk.disabled = false;
        btnCancel.disabled = false;
        btnOk.innerText = "確認交易送出";
    }
}
</script>
</body>
</html>
